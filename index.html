<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Respect Town - S2</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #D4AF37;
            --light-gold: #FFD700;
            --dark-bg: #0f0f0f;
            --glass-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 450px;
            text-align: center;
            padding: 40px 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 25px;
        }

        .logo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid var(--gold);
            padding: 5px;
            box-shadow: 0 0 20px var(--gold);
            object-fit: cover;
        }

        h1 {
            color: var(--light-gold);
            font-size: 2.2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .description {
            font-size: 0.95rem;
            color: #ccc;
            line-height: 1.6;
            margin-bottom: 30px;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 15px;
        }

        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .btn-discord {
            background: #5865F2;
            color: white;
        }

        .btn-discord:hover { background: #4752c4; transform: scale(1.03); }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
        }

        .btn-outline:hover {
            background: var(--gold);
            color: black;
            transform: scale(1.03);
        }

        .btn-solid {
            background: var(--gold);
            color: black;
        }

        .btn-solid:hover { background: var(--light-gold); transform: scale(1.03); }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="https://cdn.discordapp.com/attachments/1384536194829779068/1503735303796428961/IMG_9909-1.gif?ex=6a046e22&is=6a031ca2&hm=5c042e43c212fc654ef95fe672f4947c76f0c052c0b81d05e3d216bd396c731f&" alt="Respect Town Logo" class="logo">
    </div>

    <h1>Respect - Town - S2 | 🇸🇦</h1>

    <div class="description">
        <strong>✨ مميزات ريسبكت تاون:</strong><br>
        • تجربة حياة واقعية متكاملة 🎭<br>
        • نظام عصابات ووظائف متطور 💼<br>
        • إدارة محترفة متواجدة 24/7 🛠️
    </div>

    <div class="btn-list">
        <a href="https://discord.gg/mEvSf2qZE" target="_blank" class="btn btn-discord">
            <i class="fab fa-discord"></i> سيرفر الديسكورد
        </a>

        <a class="btn btn-outline" onclick="alert('قوانين Respect Town:\n1. الاحترام المتبادل بين الجميع.\n2. يمنع السب والقذف نهائياً.\n3. الالتزام بقوانين الرول بلاي والواقعية.')">
            <i class="fas fa-gavel"></i> القوانين
        </a>

        <a class="btn btn-outline" onclick="alert('مؤسسي السيرفر:\n• أبو سويحل\n• خيال\n• يوسف\n• بندر\n• طلال')">
            <i class="fas fa-crown"></i> المؤسسين
        </a>

        <a class="btn btn-solid" onclick="alert('المميزات:\n• فعاليات يومية\n• نظام حماية عالي\n• اقتصاد متوازن')">
            <i class="fas fa-star"></i> المميزات
        </a>
    </div>
</div>

</body>
</html>
